<style>

<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;

// ============================================================
// API
// ============================================================
const api = {
  listSessions: () => fetch('/api/sessions').then(r => r.json()),
  createSession: (title) => fetch('/api/sessions', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({title}),
  }).then(r => r.json()),
  getSession: (id) => fetch(`/api/sessions/${id}`).then(r => r.json()),
  deleteSession: (id) => fetch(`/api/sessions/${id}`, {method: 'DELETE'}).then(r => r.json()),
  listTools: () => fetch('/api/tools').then(r => r.json()),
  getStats: () => fetch('/api/stats').then(r => r.json()),
  resolveApproval: (id, approved, reason) => fetch(`/api/approvals/${id}`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({approved, reason}),
  }).then(r => r.json()),
};

// SSE 流: 不能用原生 EventSource(只支持 GET)
async function* streamMessages(sessionId, message) {
  const res = await fetch(`/api/sessions/${sessionId}/messages`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({message}),
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let buf = '';

  while (true) {
    const {done, value} = await reader.read();
    if (done) break;
    buf += decoder.decode(value, {stream: true});
    const parts = buf.split('\n\n');
    buf = parts.pop();
    for (const frame of parts) {
      if (!frame.trim()) continue;
      let eventType = 'message';
      let data = '';
      for (const line of frame.split('\n')) {
        if (line.startsWith('event:')) eventType = line.slice(6).trim();
        else if (line.startsWith('data:')) data = line.slice(5).trim();
      }
      try {
        yield {type: eventType, data: JSON.parse(data)};
      } catch (e) {
        console.error('SSE parse error', e, frame);
      }
    }
  }
}

// ============================================================
// Markdown 渲染工具
// ============================================================
function parseMarkdown(text) {
  if (!text) return '';
  if (typeof marked === 'undefined') return text;
  try {
    marked.setOptions({ breaks: true, gfm: true });
    return marked.parse(text);
  } catch (e) {
    return text;
  }
}

// ============================================================
// 子组件
// ============================================================

function ToolStep({step}) {
  const [expanded, setExpanded] = useState(false);
  const argsPreview = step.arguments ? JSON.stringify(step.arguments) : '';
  const isRejected = step.approved === false;
  const isPending = step.result === undefined;

  let statusText;
  if (isPending) statusText = '运行中…';
  else if (isRejected) statusText = '已拒绝';
  else statusText = expanded ? '▾' : '▸';

  return (
    <div className={`step ${isRejected ? 'rejected' : ''}`}>
      <div className="step-header" onClick={() => !isPending && setExpanded(!expanded)}>
        <span className="step-icon">{isRejected ? '🚫' : '🔧'}</span>
        <span className="step-name">{step.name}</span>
        <span className="step-args">{argsPreview}</span>
        <span className={`step-status ${isPending ? 'pending' : ''}`}>{statusText}</span>
      </div>
      {expanded && !isPending && (
        <div className="step-body">
          <div className="step-body-label">参数</div>
          {JSON.stringify(step.arguments, null, 2)}
          <div className="step-body-label">结果</div>
          {step.result}
        </div>
      )}
    </div>
  );
}

function Turn({turn, isStreaming}) {
  return (
    <div className="turn">
      <div className="msg-user">{turn.user}</div>
      {turn.steps.length > 0 && (
        <div className="steps">
          {turn.steps.map((step, i) => <ToolStep key={step.id || i} step={step} />)}
        </div>
      )}
      {(turn.assistant || isStreaming) && (
        <div
          className={`msg-assistant ${isStreaming ? 'streaming' : ''}`}
          dangerouslySetInnerHTML={{__html: parseMarkdown(turn.assistant) || ''}}
        />
      )}
    </div>
  );
}

function ToolsDrawer({open, onClose, tools}) {
  if (!open) return null;
  return (
    <>
      <div className="drawer-backdrop" onClick={onClose} />
      <div className="drawer">
        <div className="drawer-header">
          <div className="drawer-title">已注册工具 ({tools.length})</div>
          <button className="drawer-close" onClick={onClose}>×</button>
        </div>
        <div className="drawer-body">
          {tools.map(t => (
            <div key={t.name} className="tool-item">
              <div>
                <span className="tool-item-name">{t.name}</span>
                <span className={`tool-item-tag tag-${t.approval}`}>{t.approval}</span>
              </div>
              <div className="tool-item-desc">{t.description}</div>
            </div>
          ))}
        </div>
      </div>
    </>
  );
}

// ===== 审批弹框 =====
function ApprovalModal({request, onResolve}) {
  const [reason, setReason] = useState('');
  const [remaining, setRemaining] = useState(request.timeout || 120);

  // 倒计时
  useEffect(() => {
    setRemaining(request.timeout || 120);
    const t = setInterval(() => {
      setRemaining(r => Math.max(0, r - 1));
    }, 1000);
    return () => clearInterval(t);
  }, [request.id, request.timeout]);

  function handleApprove() {
    onResolve(true, '');
  }

  function handleReject() {
    onResolve(false, reason);
  }

  const argsStr = JSON.stringify(request.arguments, null, 2);
  const progressPct = (remaining / (request.timeout || 120)) * 100;

  return (
    <div className="modal-backdrop">
      <div className="modal" role="dialog" aria-modal="true">
        <div className="modal-header">
          <span className="modal-header-icon">⚠️</span>
          <span className="modal-header-title">需要确认: 危险工具调用</span>
        </div>
        <div className="modal-body">
          <div className="modal-tool-label">即将执行</div>
          <div className="modal-tool-name">{request.tool_name}</div>

          <div className="modal-args-label">参数</div>
          <pre className="modal-args">{argsStr}</pre>

          <div className="modal-reason-label">拒绝时可附理由(可选, 模型会看到):</div>
          <textarea
            className="modal-reason"
            value={reason}
            onChange={e => setReason(e.target.value)}
            placeholder="例如: 不要在生产路径下写文件…"
          />

          <div className="modal-timer">
            ⏱ {remaining}s 后自动拒绝
          </div>
          <div className="modal-progress-bar">
            <div className="modal-progress-fill" style={{width: progressPct + '%'}} />
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn btn-danger" onClick={handleReject}>
            拒绝
          </button>
          <button className="btn btn-primary" onClick={handleApprove} autoFocus>
            允许执行
          </button>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// 主组件
// ============================================================

function App() {
  const [sessions, setSessions] = useState([]);
  const [activeId, setActiveId] = useState(null);
  const [turns, setTurns] = useState([]);
  const [usage, setUsage] = useState({total_tokens: 0, calls: 0});
  const [input, setInput] = useState('');
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState(null);
  const [tools, setTools] = useState([]);
  const [toolsOpen, setToolsOpen] = useState(false);
  const [stats, setStats] = useState(null);

  // 待处理的审批 (queue, 万一同时来几个)
  const [pendingApprovals, setPendingApprovals] = useState([]);

  const messagesEndRef = useRef(null);
  const textareaRef = useRef(null);

  useEffect(() => {
    messagesEndRef.current?.scrollIntoView({behavior: 'smooth'});
  }, [turns]);

  const refreshSessions = useCallback(async () => {
    const list = await api.listSessions();
    setSessions(list);
    return list;
  }, []);

  useEffect(() => {
    api.listTools().then(setTools);
  }, []);

  const refreshStats = useCallback(async () => {
    const s = await api.getStats();
    setStats(s);
  }, []);

  useEffect(() => { refreshStats(); }, [refreshStats]);

  useEffect(() => {
    (async () => {
      const list = await refreshSessions();
      if (list.length > 0) await loadSession(list[0].id);
      else await handleNew();
    })();
    // eslint-disable-next-line
  }, []);

  async function loadSession(id) {
    const s = await api.getSession(id);
    setActiveId(s.id);
    setTurns(s.turns);
    setUsage(s.usage);
    setError(null);
  }

  async function handleNew() {
    const s = await api.createSession();
    await refreshSessions();
    await loadSession(s.id);
  }

  async function handleDelete(id, e) {
    e.stopPropagation();
    if (!confirm('删除这个会话?')) return;
    await api.deleteSession(id);
    const list = await refreshSessions();
    if (activeId === id) {
      if (list.length > 0) await loadSession(list[0].id);
      else await handleNew();
    }
  }

  // 处理审批: 提交 + 移出队列
  async function handleApprovalResolve(approvalId, approved, reason) {
    try {
      await api.resolveApproval(approvalId, approved, reason);
    } catch (e) {
      console.error('提交审批失败', e);
    }
    setPendingApprovals(prev => prev.filter(p => p.id !== approvalId));
  }

  async function handleSend() {
    if (!input.trim() || !activeId || busy) return;

    const userText = input.trim();
    setInput('');
    if (textareaRef.current) textareaRef.current.style.height = 'auto';
    setBusy(true);
    setError(null);

    const newTurn = {user: userText, steps: [], assistant: ''};
    setTurns(prev => [...prev, newTurn]);

    try {
      for await (const evt of streamMessages(activeId, userText)) {
        if (evt.type === 'text') {
          setTurns(prev => {
            const copy = [...prev];
            const last = {...copy[copy.length - 1]};
            last.assistant = (last.assistant || '') + evt.data.chunk;
            copy[copy.length - 1] = last;
            return copy;
          });
        } else if (evt.type === 'tool_call') {
          setTurns(prev => {
            const copy = [...prev];
            const last = {...copy[copy.length - 1], steps: [...copy[copy.length - 1].steps]};
            last.steps.push({
              id: evt.data.id,
              name: evt.data.name,
              arguments: evt.data.arguments,
              result: undefined,
            });
            copy[copy.length - 1] = last;
            return copy;
          });
        } else if (evt.type === 'tool_result') {
          setTurns(prev => {
            const copy = [...prev];
            const last = {...copy[copy.length - 1], steps: copy[copy.length - 1].steps.map(s => ({...s}))};
            const step = last.steps.find(s => s.id === evt.data.id);
            if (step) {
              step.result = evt.data.result;
              step.approved = evt.data.approved;
            }
            copy[copy.length - 1] = last;
            return copy;
          });
        } else if (evt.type === 'approval_required') {
          // ← 关键: 收到审批请求, 推到队列, modal 会自动弹
          setPendingApprovals(prev => [...prev, evt.data]);
        } else if (evt.type === 'approval_timeout') {
          // 后端通知超时(用户没及时点), 清掉对应的弹框
          setPendingApprovals(prev => prev.filter(p => p.id !== evt.data.id));
        } else if (evt.type === 'context_compressed') {
          // 历史被压缩了, 在当前 turn 加一个 system 消息
          const {messages_before, messages_after, tokens_before, tokens_after} = evt.data;
          const savedPct = Math.round((1 - tokens_after / tokens_before) * 100);
          setTurns(prev => {
            const copy = [...prev];
            const last = {...copy[copy.length - 1], steps: [...copy[copy.length - 1].steps]};
            last.steps.push({
              id: `compressed-${Date.now()}`,
              name: '✨ 上下文已自动压缩',
              arguments: {messages_before, messages_after, tokens_before, tokens_after},
              result: `${messages_before} 条消息 → ${messages_after} 条 (${tokens_before} → ${tokens_after} tokens, 节省 ${savedPct}%)`,
              approved: true,
            });
            copy[copy.length - 1] = last;
            return copy;
          });
        } else if (evt.type === 'done') {
          setUsage(evt.data.usage);
        } else if (evt.type === 'aborted') {
          setError(`中止: ${evt.data.reason}`);
        } else if (evt.type === 'error') {
          setError(`${evt.data.type}: ${evt.data.message}`);
        }
      }
    } catch (e) {
      setError(`网络错误: ${e.message}`);
    } finally {
      setBusy(false);
      refreshSessions();
      refreshStats();
    }
  }

  function handleKeyDown(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  }

  function autosize(e) {
    setInput(e.target.value);
    e.target.style.height = 'auto';
    e.target.style.height = Math.min(e.target.scrollHeight, 200) + 'px';
  }

  const examples = [
    "查一下《三体》还有库存吗",
    "13800138001 是谁? 借了什么?",
    "全馆现在有哪些超期没还的",
    "把图书馆统计写入 /tmp/library_report.txt",  // ↑ 触发 write_file 审批
  ];

  const activeSession = sessions.find(s => s.id === activeId);
  const currentApproval = pendingApprovals[0];  // 一次只显示一个

  return (
    <div className="app">
      {/* 侧边栏 */}
      <div className="sidebar">
        <div className="sidebar-header">
          <div className="sidebar-title">✦ ThinkX Agent</div>
          <div className="sidebar-subtitle">AI智能体 v3</div>
          <button className="btn-new" onClick={handleNew}>+ 新建会话</button>
        </div>

        <div className="session-list">
          {sessions.map(s => (
            <div
              key={s.id}
              className={`session-item ${s.id === activeId ? 'active' : ''}`}
              onClick={() => loadSession(s.id)}
            >
              <div style={{flex: 1, overflow: 'hidden'}}>
                <div style={{whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis'}}>
                  {s.title}
                </div>
                <div className="session-item-meta">{s.message_count} 条消息</div>
              </div>
              <button className="session-delete" onClick={(e) => handleDelete(s.id, e)}>×</button>
            </div>
          ))}
        </div>

        <div className="sidebar-footer">
          {stats && (
            <>
              <div className="stat-row"><span>累计 trace</span><b>{stats.trace_count}</b></div>
              <div className="stat-row"><span>LLM 调用</span><b>{stats.llm_calls}</b></div>
              <div className="stat-row"><span>工具调用</span><b>{stats.tool_calls}</b></div>
              <div className="stat-row"><span>累计成本</span><b>{stats.cost_formatted}</b></div>
            </>
          )}
        </div>
      </div>

      {/* 主对话区 */}
      <div className="main">
        <div className="main-header">
          <div className="main-title">{activeSession?.title || '加载中…'}</div>
          <div style={{display: 'flex', gap: 16, alignItems: 'center'}}>
            <div className="main-meta">{usage.calls} 次调用 · {usage.total_tokens} tokens</div>
            <button
              onClick={() => setToolsOpen(true)}
              style={{padding: '6px 12px', border: '1px solid #ddd', borderRadius: 6, background: 'white', cursor: 'pointer', fontSize: 13}}
            >
              🔧 工具 ({tools.length})
            </button>
          </div>
        </div>

        <div className="messages">
          {turns.length === 0 ? (
            <div className="empty">
              <h2>👋 你好</h2>
              <div>试试这些问题:</div>
              <div className="empty-hints">
                {examples.map((q, i) => (
                  <div key={i} className="empty-hint" onClick={() => setInput(q)}>
                    {q}
                  </div>
                ))}
              </div>
            </div>
          ) : (
            turns.map((turn, i) => (
              <Turn key={i} turn={turn} isStreaming={busy && i === turns.length - 1} />
            ))
          )}
          {error && <div className="error-banner">{error}</div>}
          <div ref={messagesEndRef} />
        </div>

        <div className="input-area">
          <div className="input-row">
            <textarea
              ref={textareaRef}
              className="input-textarea"
              value={input}
              onChange={autosize}
              onKeyDown={handleKeyDown}
              placeholder="输入消息… (Enter 发送, Shift+Enter 换行)"
              rows={1}
              disabled={busy}
            />
            <button className="btn-send" onClick={handleSend} disabled={busy || !input.trim()}>
              {busy ? '…' : '发送'}
            </button>
          </div>
          <div className="input-tip">
            危险工具会弹框确认 · 安全工具自动执行
          </div>
        </div>
      </div>

      <ToolsDrawer open={toolsOpen} onClose={() => setToolsOpen(false)} tools={tools} />

      {/* 审批弹框 */}
      {currentApproval && (
        <ApprovalModal
          key={currentApproval.id}
          request={currentApproval}
          onResolve={(approved, reason) => handleApprovalResolve(currentApproval.id, approved, reason)}
        />
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
