name: library_multi_tool
description: 需要多个工具协作的复合查询
cases:
  - id: reader_with_loans
    description: 查读者 + 借阅状态 - 需要 find_reader 或 get_reader_loans
    input: 张三现在借了什么书? 有罚款吗?
    asserts:
      - type: tool_call_count
        min: 1
        max: 3
      - type: contains_any
        # 张三应该在借, 不应有罚款
        options: ["在借", "未还", "借了"]

  - id: r002_with_overdue
    description: R002 有一本超期未还, agent 应明确提醒
    input: 读者 R002 的借阅情况怎么样
    asserts:
      - type: tool_called
        name: get_reader_loans
        args:
          card_no: R002
      - type: contains
        text: 超期

  - id: hot_books_query
    description: 热门图书统计
    input: 这个图书馆借阅最多的书是哪几本
    asserts:
      - type: tool_called
        name: library_stats
      - type: contains_any
        options: ["三体", "活着", "人类简史"]
        # 种子数据里这几本都有借阅
